name: Build & Release SeaLight_Studio

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12.3"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Win build with PyInstaller # for Windows
        run: |
          python -OO -m PyInstaller src/main.py  --optimize 2 --clean --onefile --noconsole --name SeaLight_Studio --icon icon/icon.ico --add-data="icon/icon.ico;icon" --add-data="src/theme.json;src"
        if: runner.os == 'Windows'

      - name: Linux build with PyInstaller # for Linux
        run: |
          python3 -OO -m PyInstaller src/main.py --strip --optimize 2 --clean -F --noconsole --hidden-import='PIL._tkinter_finder' --name SeaLight_Studio --icon icon/icon.ico --add-data="icon/icon.ico:icon" --add-data="src/theme.json:src"
        if: runner.os != 'Windows'

      - name: upload artifacts # upload des artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ runner.os }}-SeaLight_Studio
          path: dist/*

  # abandon signing because ricardoapaes may be unsafe
