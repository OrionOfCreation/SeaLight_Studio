  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            Voici les exécutables pour SeaLight_Studio ${{ github.ref_name }}.
            - Windows : `SeaLight_Studio.exe`
            - Linux : `SeaLight_Studio`
          draft: false
          prerelease: false

      - name: List artifacts content
        run: |
          echo dossier
          ls -la artifacts/
          echo ==Linux==
          ls -la artifacts/Linux-SeaLight_Studio/
          echo ==Win==
          ls -la artifacts/Windows-SeaLight_Studio/

      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Linux-SeaLight_Studio/SeaLight_Studio
          asset_name: SeaLight_Studio_Linux
          asset_content_type: application/octet-stream

      - name: Upload Windows binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Windows-SeaLight_Studio/SeaLight_Studio.exe
          asset_name: SeaLight_Studio_Windows.exe
          asset_content_type: application/octet-stream
